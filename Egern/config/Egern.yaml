# 自用配置
ipv6: false
http_port: 8200
socks_port: 8300
allow_external_connections: false
vif_only: true
geoip_db_url: https://github.com/Masaiki/GeoIP2-CN/raw/release/Country.mmdb
direct_latency_test_url: http://taobao.com/
compat_route: false
dns:
  bootstrap:
  - 233.5.5.5
  - 119.29.29.29
  upstreams:
    SecureDNS:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  forward:
  - domain_wildcard:
      match: '*'
      value: SecureDNS
  public_ip_lookup_url: https://ifconfig.me/ip
policy_groups:
- select:
    name: 兜底策略
    policies:
    - 香港节点
    - 台湾节点
    - 日本节点
    - 韩国节点
    - 狮城节点
    - 美国节点
    - DIRECT
    flatten: false
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Quantumult_X.png
    hidden: false
- external:
    name: 查看节点
    type: select
    urls:

     - 此处添加订阅
    filter: ^
    update_interval: 86400
    icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/chaxun(3).png
    hidden: false
- select:
    name: Emby
    policies:
    - 香港节点
    - 台湾节点
    - 日本节点
    - 韩国节点
    - 狮城节点
    - 美国节点
    - DIRECT
    flatten: false
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png
    hidden: false
- select:
    name: 大陆服务
    policies:
    - 香港节点
    - 台湾节点
    - DIRECT
    flatten: false
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png
    hidden: false
- select:
    name: 国外服务
    policies:
    - 香港节点
    - 台湾节点
    - 日本节点
    - 韩国节点
    - 狮城节点
    - 美国节点
    - 优选节点
    flatten: false
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Europe_Map.png
    hidden: false
- select:
    name: 人工智能
    policies:
    - 香港节点
    - 台湾节点
    - 日本节点
    - 韩国节点
    - 狮城节点
    - 美国节点
    - 优选节点
    - DIRECT
    flatten: false
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png
    hidden: false
- select:
    name: 苹果服务
    policies:
    - 香港节点
    - 台湾节点
    - DIRECT
    flatten: false
    icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_GameCenter.png
    hidden: false
- select:
    name: Spotify
    policies:
    - 香港节点
    - 台湾节点
    - 日本节点
    - 韩国节点
    - 狮城节点
    - 美国节点
    - 其他节点
    flatten: false
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png
    hidden: false
- select:
    name: 假日飞行家
    policies:
    - 香港节点
    - 台湾节点
    - 日本节点
    - 韩国节点
    - 狮城节点
    - 美国节点
    - 优选节点
    - 其他节点
    flatten: false
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Oceania_Map.png
    hidden: false
- select:
    name: 香港节点
    policies:
    - 查看节点
    flatten: true
    filter: 香港|港|HK|🇭🇰|(?i)Hong
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    hidden: false
- auto_test:
    name: 台湾节点
    policies:
    - 查看节点
    flatten: true
    filter: 台湾|台|TW|🇼🇸|(?i)Taiwan
    interval: 1800
    tolerance: 50
    timeout: 5
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    hidden: false
- auto_test:
    name: 日本节点
    policies:
    - 查看节点
    flatten: true
    filter: 日本|日|JP|🇯🇵|(?i)Japan
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    hidden: false
- auto_test:
    name: 韩国节点
    policies:
    - 查看节点
    flatten: true
    filter: 韩国|韩|KR|🇰🇷|(?i)Korea
    interval: 1800
    tolerance: 50
    timeout: 5
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png
    hidden: false
- auto_test:
    name: 狮城节点
    policies:
    - 查看节点
    flatten: true
    filter: 新加坡|狮|SG|🇸🇬|(?i)Singapore
    interval: 1800
    tolerance: 50
    timeout: 5
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    hidden: false
- select:
    name: 美国节点
    policies:
    - 查看节点
    flatten: true
    filter: 美国|美|US|🇺🇸|(?i)States
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Malaysia.png
    hidden: false
- auto_test:
    name: 优选节点
    policies:
    - 查看节点
    flatten: true
    filter: 优选
    interval: 1000
    tolerance: 50
    timeout: 5
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cloudflare.png
    hidden: false
- auto_test:
    name: 其他节点
    policies:
    - 查看节点
    flatten: true
    filter: ^(?!.*(香港|台湾|日本|韩国|新加坡|美国|港|台|日|韩|新|美|HK|TW|JP|KR|SG|US|🇬🇧|🇺🇸|🇲🇴|🇸🇬|🇯🇵|🇭🇰|🇰🇷)).*
    interval: 600
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/CA.png
    hidden: false
